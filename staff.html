<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="version" content="v3.2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة العاملين — مجمع حلق جامع النصار</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#1a3c5e;--pl:#2563a8;--acc:#c8a84b;--bg:#f4f2ec;--bg2:#fff;
  --tm:#1a1a2e;--ts:#5a6a7a;--bd:#ddd5c0;--ok:#1e7e4a;--er:#c0392b;--wa:#d4890a;
  --r:14px;--sh:0 4px 24px rgba(26,60,94,.10);--shl:0 12px 40px rgba(26,60,94,.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tm);direction:rtl;}

/* ══ شاشة الدخول ══ */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1a3c5e,#2563a8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.lcard{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.25);text-align:center;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.llogo{width:72px;height:72px;background:linear-gradient(135deg,#c8a84b,#f0d080);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.llogo i{font-size:32px;color:var(--p);}
.lcard h2{font-size:22px;font-weight:800;color:var(--p);margin-bottom:6px;}
.lcard p{font-size:13px;color:var(--ts);margin-bottom:28px;}
.linput{width:100%;border:2px solid var(--bd);border-radius:12px;padding:14px 18px;font-family:'Tajawal',sans-serif;font-size:18px;text-align:center;letter-spacing:6px;color:var(--p);font-weight:700;margin-bottom:16px;transition:border-color .2s;}
.linput:focus{outline:none;border-color:var(--pl);}
.lbtn{width:100%;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.lbtn:disabled{opacity:.7;cursor:not-allowed;}
.lerr{color:var(--er);font-size:13px;margin-top:8px;display:none;}
.llinks{margin-top:18px;display:flex;justify-content:center;gap:20px;}
.llinks a{font-size:12.5px;color:var(--ts);text-decoration:none;display:flex;align-items:center;gap:5px;}
/* ══ هيدر ══ */
.site-header{background:var(--p);position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.18);}
.hinner{display:flex;align-items:center;gap:12px;padding:10px 20px;}
.hlogo{width:40px;height:40px;background:var(--acc);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hlogo i{font-size:17px;color:var(--p);}
.htitle h1{font-size:16px;font-weight:800;color:#fff;margin:0;line-height:1.2;}
.htitle p{font-size:11px;color:rgba(255,255,255,.55);margin:0;}
.hright{margin-right:auto;display:flex;align-items:center;gap:9px;}
.uchip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:5px 12px;border-radius:18px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.rbadge{background:var(--acc);color:var(--p);padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}
.lout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.hambtn{display:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;width:36px;height:36px;border-radius:8px;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;}
/* ══ تخطيط ══ */
#appScreen{display:none;height:calc(100vh - 58px);}
.app-layout{display:flex;height:100%;overflow:hidden;}
.sidebar{width:240px;background:var(--bg2);border-left:1px solid var(--bd);flex-shrink:0;overflow-y:auto;transition:transform .3s;}
.s-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
.main-content{flex:1;overflow-y:auto;padding:22px 28px;min-width:0;}
/* ══ سيدبار ══ */
.slabel{font-size:10px;font-weight:700;color:var(--ts);letter-spacing:.5px;padding:12px 16px 4px;text-transform:uppercase;}
.nitem{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:9px;cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;color:var(--ts);position:relative;margin:1px 8px;}
.nitem:hover{background:var(--bg);color:var(--p);}
.nitem.active{background:linear-gradient(135deg,rgba(26,60,94,.1),rgba(37,99,168,.07));color:var(--p);}
.nitem.active::before{content:'';position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--p);border-radius:2px;}
.nitem i{width:16px;text-align:center;}
.nbadge{margin-right:auto;background:var(--er);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;}
/* ══ KPI ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:22px;}
.kpi-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.kpi-card:hover{transform:translateY(-3px);box-shadow:var(--shl);}
.bgico{position:absolute;left:-8px;bottom:-10px;font-size:60px;opacity:.06;color:var(--p);pointer-events:none;transition:transform .35s;}
.kpi-card:hover .bgico{transform:scale(1.18) rotate(8deg);}
.klabel{font-size:11.5px;font-weight:600;color:var(--ts);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.kval{font-size:30px;font-weight:800;color:var(--p);line-height:1;}
.kpi-ok .kval{color:var(--ok);}.kpi-er .kval{color:var(--er);}.kpi-wa .kval{color:var(--wa);}.kpi-ac .kval{color:#8b5e0a;}
/* ══ بطاقات ══ */
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.chdr{padding:12px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:#fafaf8;flex-wrap:wrap;}
.chdr h3{font-size:14px;font-weight:700;color:var(--p);margin:0;}
.cacts{margin-right:auto;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.cbody{padding:18px 20px;}
/* ══ جدول ══ */
.dt{width:100%;border-collapse:collapse;font-size:13px;}
.dt th{background:#f4f2ec;color:var(--ts);font-weight:700;font-size:11px;padding:9px 12px;text-align:right;border-bottom:2px solid var(--bd);white-space:nowrap;}
.dt td{padding:9px 12px;border-bottom:1px solid #f0ece0;vertical-align:middle;}
.dt tr:hover td{background:#fafaf8;}
.dt tr:last-child td{border-bottom:none;}
/* ══ شارات ══ */
.bp{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;}
.bp-ok{background:#eafaf1;color:var(--ok);}.bp-er{background:#fdf0ef;color:var(--er);}.bp-wa{background:#fff8e6;color:var(--wa);}.bp-in{background:#eef3ff;color:var(--pl);}.bp-gr{background:#f0f0f0;color:#666;}
/* ══ فلاتر ══ */
.fb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.fi{border:1.5px solid var(--bd);border-radius:8px;padding:7px 12px;font-family:'Tajawal',sans-serif;font-size:13px;background:#fafaf8;color:var(--tm);}
.fi:focus{outline:none;border-color:var(--pl);}
/* ══ تبويبات ══ */
.stabs{display:flex;border-bottom:2px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.stabs::-webkit-scrollbar{display:none;}
.stab{padding:9px 16px;font-family:'Tajawal',sans-serif;font-size:12.5px;font-weight:600;color:var(--ts);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.stab:hover{color:var(--p);}
.stab.active{color:var(--p);border-bottom-color:var(--p);}
.spanel{display:none;}
.spanel.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* ══ أزرار ══ */
.pb{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:8px;padding:8px 17px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.pb:hover{filter:brightness(1.1);}
.pb:disabled{opacity:.6;cursor:not-allowed;}
.ob{background:transparent;color:var(--p);border:1.5px solid var(--p);border-radius:8px;padding:6px 13px;font-family:'Tajawal',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.ob:hover{background:var(--p);color:#fff;}
.sm{padding:4px 10px;font-size:11.5px;border-radius:6px;}
.okb{background:var(--ok);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-family:'Tajawal',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.okb:disabled{opacity:.5;cursor:not-allowed;}
.erb{background:var(--er);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-family:'Tajawal',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.erb:disabled{opacity:.5;cursor:not-allowed;}
.wab{background:#25D366;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-family:'Tajawal',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.warnb{background:var(--wa);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-family:'Tajawal',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
/* ══ ترقيم ══ */
.pgbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0;font-size:12.5px;color:var(--ts);flex-wrap:wrap;gap:7px;}
.pgbtns{display:flex;gap:5px;}
.pgbtn{width:29px;height:29px;border:1.5px solid var(--bd);border-radius:7px;background:var(--bg2);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;color:var(--ts);display:flex;align-items:center;justify-content:center;}
.pgbtn:hover,.pgbtn.active{background:var(--p);border-color:var(--p);color:#fff;}
/* ══ بطاقات إنذار ══ */
.wcard{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:13px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:11px;}
.wcard:hover{box-shadow:var(--sh);}
.wico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.wi-e{background:#fdf0ef;color:var(--er);}
.wi-l{background:#fff3e0;color:#e65100;}
.wbody{flex:1;min-width:0;}
.wbody h4{font-size:13px;font-weight:700;margin-bottom:3px;}
.wbody p{font-size:11.5px;color:var(--ts);line-height:1.5;margin:0;}
.wacts{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
/* ══ سبينر ══ */
.spov{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(3px);}
.spri{width:50px;height:50px;border:4px solid #e0d8c8;border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:13px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-sm{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
.spov p{color:var(--p);font-size:14px;font-weight:600;}
/* ══ empty ══ */
.empty{text-align:center;padding:34px 16px;color:var(--ts);}
.empty i{font-size:38px;margin-bottom:11px;opacity:.27;color:var(--p);display:block;}
.empty h3{font-size:14px;font-weight:700;margin-bottom:5px;color:var(--tm);}
.stitle{font-size:15px;font-weight:800;color:var(--p);margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--bd);}
.swal-rtl{direction:rtl;font-family:'Tajawal',sans-serif!important;}
.swal2-input,.swal2-select,.swal2-textarea{font-family:'Tajawal',sans-serif!important;}
/* ══ responsive ══ */
@media(min-width:1200px){.main-content{padding:26px 36px;}.sidebar{width:255px;}}
@media(max-width:900px){
  .sidebar{position:fixed;top:58px;right:0;height:calc(100vh - 58px);z-index:160;transform:translateX(100%);box-shadow:-4px 0 20px rgba(0,0,0,.15);}
  .sidebar.open{transform:translateX(0);}
  .hambtn{display:flex !important;}
  .s-overlay.show{display:block !important;}
  .main-content{padding:13px 14px;}
  #appScreen{height:calc(100vh - 54px);}
  .htitle p{display:none;}
}
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .hinner{padding:8px 10px;gap:8px;}
  .hlogo{width:36px;height:36px;}
  .hlogo i{font-size:15px;}
  .htitle h1{font-size:13px;}
  .uchip{padding:4px 8px;font-size:11px;}
  .rbadge{font-size:9.5px;padding:1px 5px;}
  .lout{padding:4px 8px;font-size:11px;}
  .lout span{display:none;}
  .dt{font-size:11.5px;}
  .dt th,.dt td{padding:7px 8px;}
  .cbody{padding:12px 14px;}
  .lcard{padding:30px 22px;}
}
</style>
</head>

<script>

// ── تحميل ملف JS الخاص بالدور ──
var _roleScriptLoaded = false;
function loadRoleScript(role, callback) {
  if (_roleScriptLoaded) {
    if (callback) callback();
    return;
  }

  var map = {
    'معلم': 'staff-teacher.js',
    'مسمع_تعليمي': 'staff-teacher.js',
    'مساعد_معلم': 'staff-teacher.js',
    'مساعد_خارجي': 'staff-teacher.js',
    'مشرف_تعليمي': 'staff-edu.js',
    'مشرف_اداري': 'staff-admin.js',
    'مدير': 'staff-director.js'
  };

  var src = map[role];
  if (!src) {
    console.warn('No script for role:', role);
    if (callback) callback();
    return;
  }

  var s = document.createElement('script');
  s.src = src + '?v=' + Date.now();

  s.onload = function () {
    _roleScriptLoaded = true;

    var expected = {
      'معلم': 'pgTeacherSt',
      'مسمع_تعليمي': 'pgTeacherSt',
      'مساعد_معلم': 'pgTeacherSt',
      'مساعد_خارجي': 'pgTeacherSt',
      'مشرف_تعليمي': 'pgEduKpi',
      'مشرف_اداري': 'pgAdminKpi',
      'مدير': 'pgDirectorKpi'
    }[role];

    if (expected && typeof window[expected] !== 'function') {
      console.error('Role script loaded but function missing:', expected);
      alert('تم تحميل ملف الدور لكن الدالة المطلوبة غير موجودة: ' + expected);
      return;
    }

    if (callback) callback();
  };

  s.onerror = function () {
    console.error('Failed to load role script:', src);
    alert('تعذر تحميل ملف الدور: ' + src);
  };

  document.head.appendChild(s);
}

// ══════════════════════════════════════════════════════
// الثوابت والحالة
// ══════════════════════════════════════════════════════
var API='https://script.google.com/macros/s/AKfycbyfNLsP39SOzW1egWRWBG3OPEXUUJHxqZqa3yylzSY2hY_Dw_YOK9_W_-_iRFF-feUJFw/exec';
var PG=50;
var GRADES={'ابتدائي':['الأول الابتدائي','الثاني الابتدائي','الثالث الابتدائي','الرابع الابتدائي','الخامس الابتدائي','السادس الابتدائي'],'متوسط':['الأول المتوسط','الثاني المتوسط','الثالث المتوسط'],'ثانوي':['الأول الثانوي','الثاني الثانوي','الثالث الثانوي'],'جامعي':['السنة الأولى','السنة الثانية','السنة الثالثة','السنة الرابعة','أكثر من أربع سنوات']};

// ── الحالة العالمية: تُملأ مرة واحدة عند الدخول ──
var D = {
  user:null, role:'',
  circles:[], statuses:[], templates:[], procedures:[], thresholds:[],
  setUsers:[], setCircles:[], setStates:[],
  teacherStudents:[], teacherKpi:{},
  eduKpi:{}, eduWarnings:[], eduStudents:[], eduStudentMap:{}, eduProcs:[],
  students:[], studentsTotal:0, studentsPages:1, studentsPage:1,
  reqNew:[], reqWait:[], reqEdits:[], reqRej:[], reqRejLoaded:false,
  adminEduW:[], adminAdmW:[], kpi:{}, allWarnMap:{},
  dirData:null,
  selStudents:new Set(),
  admType:'تأخر', admTpl:null, admProcs:[],
  eduReasons:[], // أسباب الإنذارات التعليمية
};
var _curTab = 'rqNew'; // حفظ تبويب الطلبات

// ══ دوال مساعدة ══
function arr(v){return Array.isArray(v)?v:[];}
function spin(s,t){document.getElementById('spov').style.display=s?'flex':'none';if(t)document.getElementById('spTxt').textContent=t;}
function mc(h){document.getElementById('mainContent').innerHTML=h;}

function hasPerm(page,action){
  action=action||'can_view';
  var u=D.user||{};
  if(u.is_super_admin)return true;
  var ps=arr(u.permissions);
  var p=ps.find(function(x){return x.page_key===page;});
  return !!(p&&p[action]);
}

// ══ API ══
async function api(action,data){
  data = data || {};

  var token = D.sessionToken || (function(){
    try { return localStorage.getItem('alnsar_staff_token') || ''; } catch(e) { return ''; }
  })();

  if (token && !data._token) data._token = token;

  var r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: action, data: data })
  });

  var json = await r.json();

  if (json && json.خطأ && String(json.خطأ).includes('الجلسة غير صالحة')) {
    try { localStorage.removeItem('alnsar_staff_token'); } catch(e) {}
    D.sessionToken = '';
  }

  return json;
}

// PREFETCH — طلب واحد لكل شيء
// ══════════════════════════════════════════════════════
async function prefetch(){
  var role=D.role, حلقة=D.user['الحلقة']||'';
  try{
    if(isTeacherLike(role)){
      var rs=await Promise.all([
        api('جلب_طلاب_الحلقة',{الحلقة:حلقة}),
        api('جلب_تقارير_معلم',{الحلقة:حلقة}),
      ]);
      D.teacherStudents=arr(rs[0].طلاب);
      D.teacherKpi=rs[1].تقارير||{};
    }
    else if(role==='مشرف_تعليمي'){
      var rs=await Promise.all([
        api('جلب_تقارير_مشرف_تعليمي',{}),
        api('جلب_الانذارات_التعليمية',{}),
        api('جلب_الطلاب',{حجم_الصفحة:999,الصفحة:1}),
        api('جلب_الحلق',{}),
        api('جلب_قوالب_الرسائل',{}),
        api('جلب_الاجراءات',{نوع_الاجراء:'تعليمي'}),
      ]);
      D.eduKpi=rs[0].تقارير||{};
      D.eduWarnings=arr(rs[1].انذارات);
      D.eduStudents=arr(rs[2].طلاب);
      D.eduStudentMap={};
      D.eduStudents.forEach(function(s){D.eduStudentMap[s['اسم_الطالب']]=s;});
      D.circles=arr(rs[3].حلق).map(function(h){return h['اسم_الحلقة'];});
      D.templates=arr(rs[4].قوالب);
      D.eduProcs=arr(rs[5].إجراءات).map(function(x){return x['اسم_الاجراء'];}).filter(Boolean);
      // الأسباب والإجراءات منفصلان:
      // D.eduProcs = إجراءات المتابعة الإدارية (تُستخدم في select تحديث الإجراء)
      // D.eduReasons = أسباب الإنذار (تُستخدم في قائمة إصدار الإنذار)
      // نجلب الأسباب من API مخصص أو نستخدم قائمة منفصلة بنوع 'سبب_تعليمي'
      D.eduReasons=arr(rs[5].إجراءات)
        .filter(function(x){return x['نوع_الاجراء']==='سبب_تعليمي'||x['نوع_الاجراء']==='تعليمي';})
        .map(function(x){return x['اسم_الاجراء'];}).filter(Boolean);
      // إذا لم توجد أسباب مخصصة، نستخدم الإجراءات التعليمية مؤقتاً
      if(!D.eduReasons.length) D.eduReasons=D.eduProcs;
    }
    else if(role==='مشرف_اداري'){
      // 8 طلبات أساسية فقط — تكفي لعرض الصفحة فوراً
      var rs=await Promise.all([
        api('جلب_الطلاب',{حجم_الصفحة:PG,الصفحة:1}),
        api('جلب_الحلق',{}),
        api('جلب_حالات_الطالب',{}),
        api('جلب_طلبات_التسجيل',{}),
        api('جلب_طلبات_التعديل',{}),
        api('جلب_الانذارات_التعليمية',{}),
        api('جلب_قوالب_الرسائل',{}),
        api('جلب_تقارير_مشرف_اداري',{}),
      ]);
      D.students=arr(rs[0].طلاب); D.studentsTotal=rs[0].المجموع||0; D.studentsPages=rs[0].عدد_الصفحات||1;
      D.circles=arr(rs[1].حلق).map(function(h){return h['اسم_الحلقة'];});
      D.setCircles=arr(rs[1].حلق);
      D.statuses=arr(rs[2].حالات).map(function(h){return h['اسم_الحالة'];});
      D.setStates=arr(rs[2].حالات);
      var allReqs=arr(rs[3].طلبات);
      D.reqNew=allReqs.filter(function(t){return t['حالة_الطلب']==='جديد';});
      D.reqWait=allReqs.filter(function(t){return t['حالة_الطلب']==='انتظار';});
      D.reqEdits=arr(rs[4].طلبات).filter(function(t){return !t['تاريخ_المعالجة']||t['حالة_الطلب']==='بانتظار المراجعة';});
      D.adminEduW=arr(rs[5].انذارات);
      D.templates=arr(rs[6].قوالب);
      D.kpi=rs[7].تقارير||{};
      D.adminAdmW=[];
      D.thresholds=[]; D.procedures=[]; D.setUsers=[];
      D.eduReasons=[];
      D.admWarnData=null;
      updateReqBadge(); updateEduBadge();
      // الخلفية: بقية البيانات فور عرض الصفحة
      _fetchAdminBackground();
    }
    else if(role==='مدير'){
      var rs=await Promise.all([
        api('جلب_تقارير_مشرف_اداري',{}),
        api('جلب_تقارير_مشرف_تعليمي',{}),
        api('جلب_الحلق',{}),
        api('جلب_العاملين',{}),
      ]);
      D.dirData={admin:rs[0].تقارير||{},edu:rs[1].تقارير||{},circles:arr(rs[2].حلق),users:arr(rs[3].عاملون)};
    }
    saveCache();
  }catch(e){console.warn('prefetch error:',e);}
}

}

if (isTeacherLike(D.role)) {
  D.teacherStudents = init.طلاب || [];
  D.teacherKpi = init.تقارير || {};
}
else if (D.role === 'مشرف_تعليمي') {

  D.eduWarnings = init.انذارات_تعليمية || [];
  D.eduStudents = init.طلاب || [];

  D.circles = init.حلق || [];
  D.eduReasons = init.أسباب_تعليمية || [];
D.eduProcs = init.اجراءات_تعليمية || [];
}
else if (D.role === 'مشرف_اداري') {
  D.students = init.طلاب || [];
  D.studentsTotal = init.طلاب_مجموع || 0;
  D.studentsPages = init.طلاب_صفحات || 1;
  D.circles = init.حلق || [];
  D.statuses = init.حالات || [];
  D.reqNew = init.طلبات_جديدة || [];
  D.reqWait = init.طلبات_انتظار || [];
  D.reqEdits = init.طلبات_تعديل || [];
  D.adminEduW = init.انذارات_تعليمية || [];
  D.adminAdmW = init.انذارات_ادارية_ارشيف || [];
  D.templates = init.قوالب || [];
  D.thresholds = init.عتبات || [];
  D.procedures = init.اجراءات || [];
  D.eduReasons = init.أسباب_تعليمية || [];
  D.setUsers = init.عاملون || [];
  D.appPages = init.صفحات || [];

}
else if (D.role === 'مدير') {
  D.dirData = {
    admin: init.admin_kpi || {},
    edu: init.edu_kpi || {},

}
    // تحميل ملف JS الخاص بالدور

// ── جلب بيانات المشرف الإداري في الخلفية ──
function _fetchAdminBackground(){
  // كل البيانات الثانوية دفعة واحدة موازية
  Promise.all([
    api('جلب_ارشيف_انذارات_ادارية',{}),
    api('جلب_عتبات_الانذارات',{}),
    api('جلب_الاجراءات',{}),
    api('جلب_العاملين',{}),
    api('جلب_مستحقي_الانذار_الاداري',{نوع:'تأخر'}),
    api('جلب_مستحقي_الانذار_الاداري',{نوع:'غياب'}),
    api('جلب_مستحقي_الانذار_الاداري',{نوع:'غياب_بعذر'}),
    api('جلب_ارشيف_انذارات_ادارية',{نوع_الانذار:'تأخر'}),
    api('جلب_ارشيف_انذارات_ادارية',{نوع_الانذار:'غياب'}),
    api('جلب_ارشيف_انذارات_ادارية',{نوع_الانذار:'غياب_بعذر'}),
    api('جلب_الطلاب',{حجم_الصفحة:999,الصفحة:1}),
    api('جلب_صفحات_النظام',{}),
  ]).then(function(r2){
    D.adminAdmW=arr(r2[0].انذارات);
    D.thresholds=arr(r2[1].عتبات);
    D.procedures=arr(r2[2].إجراءات);
    D.setUsers=arr(r2[3].عاملون);
    // الأسباب: نوع 'سبب_تعليمي'، الإجراءات: بقية الأنواع
    // نفصلهما تماماً
    D.eduReasons=arr(r2[2].إجراءات)
      .filter(function(p){return p['نوع_الاجراء']==='سبب_تعليمي'||p['نوع_الاجراء']==='تعليمي';})
      .map(function(p){return p['اسم_الاجراء'];}).filter(Boolean);
    D.admWarnData={};
    D.admWarnData['تأخر']      ={list:arr(r2[4].طلاب),arch:arr(r2[7].انذارات)};
    D.admWarnData['غياب']      ={list:arr(r2[5].طلاب),arch:arr(r2[8].انذارات)};
    D.admWarnData['غياب_بعذر']={list:arr(r2[6].طلاب),arch:arr(r2[9].انذارات)};
    // بناء eduStudentMap للإنذارات التعليمية
    D.appPages=arr(r2[11].صفحات);
    var allStudents=arr(r2[10].طلاب);
    if(allStudents.length){
      D.eduStudentMap=D.eduStudentMap||{};
      allStudents.forEach(function(s){D.eduStudentMap[s['اسم_الطالب']]=s;});
    }
    // تحديث أرقام التبويبات إذا كانت صفحة الإنذارات مفتوحة
    var wTabs=document.getElementById('admWTabs');
    if(wTabs){
      var cntT=arr(D.admWarnData['تأخر'].list).length;
      var cntG=arr(D.admWarnData['غياب'].list).length;
      var cntE=arr(D.admWarnData['غياب_بعذر'].list).length;
      var tabs=wTabs.querySelectorAll('.stab');
      if(tabs[0])tabs[0].innerHTML='<i class="fas fa-clock"></i> التأخر'+(cntT?'<span class="nbadge" style="margin-right:5px">'+cntT+'</span>':'');
      if(tabs[1])tabs[1].innerHTML='<i class="fas fa-calendar-xmark"></i> الغياب'+(cntG?'<span class="nbadge" style="margin-right:5px">'+cntG+'</span>':'');
      if(tabs[2])tabs[2].innerHTML='<i class="fas fa-calendar-minus"></i> الغياب بعذر'+(cntE?'<span class="nbadge" style="margin-right:5px">'+cntE+'</span>':'');
    }
    saveCache();
  }).catch(function(e){console.warn('bgFetch error:',e);});
}

     +`<div class="nitem" onclick="nav('aKpi')"><i class="fas fa-chart-pie"></i> لوحة التقارير</div>`
     +`<div class="nitem" onclick="nav('aSt')"><i class="fas fa-users"></i> إدارة الطلاب</div>`
     +`<div class="nitem" onclick="nav('aReq')"><i class="fas fa-inbox"></i> الطلبات <span class="nbadge" id="nbReq">${cnt||''}</span></div>`
     +'<div class="slabel">الإنذارات</div>'
     +`<div class="nitem" onclick="nav('aEduW')"><i class="fas fa-book-open"></i> الإنذارات التعليمية</div>`
     +`<div class="nitem" onclick="nav('aAdmW')"><i class="fas fa-user-clock"></i> الإنذارات الإدارية</div>`
     +`<div class="nitem" onclick="nav('aAllW')"><i class="fas fa-list-check"></i> جميع الإنذارات</div>`
     +'<div class="slabel">الإعدادات</div>'
     +`<div class="nitem" onclick="nav('aTerms')"><i class="fas fa-calendar-days"></i> الفصول والبرامج</div>`
     +`<div class="nitem" onclick="nav('settings')"><i class="fas fa-gear"></i> الإعدادات</div>`;
  } else if(role==='مدير'){
    h='<div class="slabel">الاطلاع</div>'
     +`<div class="nitem" onclick="nav('dirKpi')"><i class="fas fa-chart-pie"></i> لوحة الإحصاءات</div>`;
  }
  document.getElementById('sidebarNav').innerHTML=h||'<div class="slabel">لا توجد صفحات متاحة</div>';
}
function navFirst(){
  if(isTeacherLike(D.role)){
    if(hasPerm('teacher_students')||D.role==='معلم') return nav('tSt');
    if(hasPerm('teacher_preparation')||hasPerm('teacher_attendance')) return nav('tPreparation');
    if(hasPerm('weekly_prep_report')||hasPerm('reports')||D.role==='معلم') return nav('tWeeklyReport');
    if(hasPerm('student_period_report')||hasPerm('reports')||D.role==='معلم') return nav('tStudentReport');
    if(hasPerm('student_paths')) return nav('tPaths');
    if(hasPerm('rabt_assessments')) return nav('tRabt');
    if(hasPerm('student_tests')) return nav('tTests');
    if(hasPerm('hizb_presentations')) return nav('tHizb');
    if(hasPerm('reports')||D.role==='معلم') return nav('tKpi');
  }
  var m={مشرف_تعليمي:'eKpi',مشرف_اداري:'aKpi',مدير:'dirKpi'};
  nav(m[D.role]||'aKpi');
}
  
function nav(page){
  closeSidebar();

  document.querySelectorAll('.nitem').forEach(function(n){
    n.classList.toggle('active', n.getAttribute('onclick') === "nav('" + page + "')");
  });

  mc('<div class="empty" style="padding:60px 20px"><div class="spri" style="margin:0 auto 10px"></div><p style="margin:0">جارٍ التحميل…</p></div>');

  switch(page){
    case 'tSt':
      if (typeof window.pgTeacherSt === 'function') return window.pgTeacherSt();
      return missingPageFunction('pgTeacherSt');

    case 'tKpi':
      if (typeof window.pgTeacherKpi === 'function') return window.pgTeacherKpi();
      return missingPageFunction('pgTeacherKpi');

    case 'tAttendance':
    case 'tPreparation':
      if (typeof window.pgTeacherPreparation === 'function') return window.pgTeacherPreparation();
      return missingPageFunction('pgTeacherPreparation');

      return missingPageFunction('pgTeacherWeeklyReport');

    case 'tStudentReport':

      return missingPageFunction('pgTeacherStudentPeriodReport');

    case 'tPaths':
      if (typeof window.pgTeacherStudentPaths === 'function') return window.pgTeacherStudentPaths();
      return missingPageFunction('pgTeacherStudentPaths');

    case 'tRabt':
      if (typeof window.pgTeacherRabt === 'function') return window.pgTeacherRabt();
      return missingPageFunction('pgTeacherRabt');

    case 'tTests':
      if (typeof window.pgTeacherTests === 'function') return window.pgTeacherTests();
      return missingPageFunction('pgTeacherTests');

    case 'tHizb':
      if (typeof window.pgTeacherHizb === 'function') return window.pgTeacherHizb();
      return missingPageFunction('pgTeacherHizb');

    case 'eKpi':
      if (typeof window.pgEduKpi === 'function') return window.pgEduKpi();
      return missingPageFunction('pgEduKpi');

    case 'eW':
      if (typeof window.pgEduW === 'function') return window.pgEduW();
      return missingPageFunction('pgEduW');

    case 'eSt':
      if (typeof window.pgEduSt === 'function') return window.pgEduSt();
      return missingPageFunction('pgEduSt');

    case 'eSupervision':
      if (typeof window.pgEduSupervision === 'function') return window.pgEduSupervision();
      return missingPageFunction('pgEduSupervision');

    case 'eAssessmentReport':
      if (typeof window.pgEduAssessmentReport === 'function') return window.pgEduAssessmentReport();
      return missingPageFunction('pgEduAssessmentReport');

    case 'eRabtWeekReport':
      if (typeof window.pgEduRabtWeekReport === 'function') return window.pgEduRabtWeekReport();
      return missingPageFunction('pgEduRabtWeekReport');

    case 'eWeekDetails':
      if (typeof window.pgEduWeekDetails === 'function') return window.pgEduWeekDetails();
      return missingPageFunction('pgEduWeekDetails');

    case 'aKpi':
      if (typeof window.pgAdminKpi === 'function') return window.pgAdminKpi();
      return missingPageFunction('pgAdminKpi');

    case 'aSt':
      if (typeof window.pgAdminSt === 'function') return window.pgAdminSt();

    case 'aReq':
      if (typeof window.pgAdminReq === 'function') return window.pgAdminReq();
      return missingPageFunction('pgAdminReq');

    case 'aEduW':
      if (typeof window.pgAdminEduW === 'function') return window.pgAdminEduW();

    case 'aAdmW':

function missingPageFunction(name){
  console.error('Missing page function:', name);
  mc(
    '<div class="empty" style="padding:80px 20px">' +
      '<i class="fas fa-circle-exclamation"></i>' +
      '<h3>تعذر فتح الصفحة</h3>' +
      '<p style="margin-top:8px;color:var(--ts)">الدالة المطلوبة غير متوفرة: ' + name + '</p>' +
    '</div>'
  );
}
