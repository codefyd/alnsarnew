<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة بيانات الطالب — مجمع حلق جامع النصار</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary:       #1a3c5e;
  --primary-light: #2563a8;
  --accent:        #c8a84b;
  --accent-light:  #f0d080;
  --surface:       #f8f6f0;
  --surface-2:     #ffffff;
  --text-main:     #1a1a2e;
  --text-muted:    #5a6a7a;
  --border:        #ddd5c0;
  --success:       #1e7e4a;
  --danger:        #c0392b;
  --warning:       #d4890a;
  --radius:        14px;
  --shadow:        0 4px 24px rgba(26,60,94,.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--surface);
  color: var(--text-main);
  min-height: 100vh;
  direction: rtl;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(26,60,94,.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(200,168,75,.06) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* ── هيدر ── */
.site-header {
  background: var(--primary);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.18);
}
.header-inner {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px; max-width: 960px; margin: 0 auto;
}
.header-logo {
  width: 48px; height: 48px; background: var(--accent);
  border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.header-logo i { font-size: 22px; color: var(--primary); }
.header-title h1 { font-size: 18px; font-weight: 800; color: #fff; line-height: 1.2; }
.header-title p  { font-size: 12px; color: rgba(255,255,255,.65); margin: 0; }
.header-badge {
  margin-right: auto;
  background: rgba(200,168,75,.2); border: 1px solid rgba(200,168,75,.4);
  color: var(--accent-light); padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
}

.main-wrap {
  position: relative; z-index: 1;
  max-width: 820px; margin: 0 auto;
  padding: 32px 16px 60px;
}

/* ── بطاقة بحث ── */
.search-card {
  background: var(--surface-2);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  animation: slideUp .35s ease both;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.search-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  padding: 22px 28px;
  display: flex; align-items: center; gap: 14px;
}
.search-header i { font-size: 26px; color: rgba(255,255,255,.85); }
.search-header-text h2 { font-size: 17px; font-weight: 700; color: #fff; margin: 0; }
.search-header-text p  { font-size: 12px; color: rgba(255,255,255,.65); margin: 2px 0 0; }

.search-body { padding: 28px; }

.search-input-wrap {
  display: flex; gap: 10px; align-items: stretch;
}
.search-input-wrap input {
  flex: 1;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 13px 18px;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  color: var(--text-main);
  background: #fafaf8;
  transition: border-color .2s, box-shadow .2s;
  direction: ltr;
  text-align: center;
}
.search-input-wrap input:focus {
  outline: none;
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(37,99,168,.12);
  background: #fff;
}
.search-input-wrap input::placeholder { direction: rtl; text-align: center; }

.btn-search {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff; border: none; border-radius: 12px;
  padding: 0 28px; font-family: 'Tajawal', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.btn-search:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,60,94,.25); }

.search-hint { font-size: 12.5px; color: var(--text-muted); margin-top: 10px; text-align: center; }

/* ── حالة الطلب ── */
.status-badges { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-radius: 20px; font-size: 12.5px; font-weight: 600;
}
.badge-pending  { background:#eef3ff; border:1px solid #b8cff5; color:#2563a8; }
.badge-approved { background:#eafaf1; border:1px solid #a9dfbf; color:#1e7e4a; }
.badge-waiting  { background:#fff8e6; border:1px solid #f5d78e; color:#b7860b; }
.badge-rejected { background:#fdf0ef; border:1px solid #f0b8b0; color:#c0392b; }

/* ── بطاقة الطالب ── */
.student-card {
  background: var(--surface-2);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-top: 24px;
  overflow: hidden;
  animation: slideUp .3s ease both;
}

.student-card-header {
  background: linear-gradient(135deg, #1a3c5e 0%, #2563a8 100%);
  padding: 22px 28px;
  display: flex; align-items: center; gap: 16px;
}
.student-avatar {
  width: 56px; height: 56px;
  background: rgba(255,255,255,.18);
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #fff; flex-shrink: 0;
}
.student-card-header h2 { font-size: 18px; font-weight: 800; color: #fff; margin: 0; }
.student-card-header p  { font-size: 12.5px; color: rgba(255,255,255,.7); margin: 3px 0 0; }
.student-status-chip {
  margin-right: auto;
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff;
}

/* تبويبات */
.tabs-bar {
  display: flex; border-bottom: 2px solid var(--border);
  padding: 0 28px; background: #fafaf8; gap: 4px;
}
.tab-btn {
  padding: 14px 20px; font-family: 'Tajawal', sans-serif;
  font-size: 13.5px; font-weight: 600; color: var(--text-muted);
  background: none; border: none; border-bottom: 3px solid transparent;
  margin-bottom: -2px; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 7px; white-space: nowrap;
}
.tab-btn:hover { color: var(--primary); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

.tab-content { display: none; padding: 28px; }
.tab-content.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* حقول عرض البيانات */
.data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:600px){ .data-grid { grid-template-columns: 1fr; } }

.data-field {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  position: relative;
}
.data-field .df-label {
  font-size: 11.5px; font-weight: 600; color: var(--text-muted);
  margin-bottom: 5px; display: flex; align-items: center; gap: 5px;
}
.data-field .df-value {
  font-size: 15px; font-weight: 700; color: var(--text-main);
  min-height: 22px;
}
.data-field .df-value.empty { color: var(--text-muted); font-weight: 400; font-style: italic; font-size: 13px; }

/* حقل قابل للتعديل */
.data-field.editable { cursor: pointer; transition: border-color .2s, box-shadow .2s; }
.data-field.editable:hover {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(37,99,168,.08);
}
.edit-icon {
  position: absolute; top: 10px; left: 10px;
  color: var(--primary-light); font-size: 11px; opacity: 0;
  transition: opacity .2s;
}
.data-field.editable:hover .edit-icon { opacity: 1; }

/* حقل التعديل */
.edit-field-wrap { margin-bottom: 16px; }
.edit-field-wrap label {
  font-size: 13px; font-weight: 600; color: var(--text-main);
  margin-bottom: 6px; display: block;
}
.edit-field-wrap input, .edit-field-wrap select {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: 'Tajawal', sans-serif; font-size: 14px;
  color: var(--text-main); background: #fafaf8;
  transition: border-color .2s;
}
.edit-field-wrap input:focus, .edit-field-wrap select:focus {
  outline: none; border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(37,99,168,.12); background: #fff;
}

/* شارة حفظ */
.save-notice {
  background: #fff8e6; border: 1px solid #f5d78e;
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; color: #7a5c00; margin-bottom: 16px;
  display: flex; align-items: flex-start; gap: 9px; line-height: 1.6;
}

/* إنذارات */
.warning-row {
  background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
}
.warning-icon-wrap {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 15px;
}
.warn-edu  { background:#fdf0ef; color:#c0392b; }
.warn-late { background:#fff3e0; color:#e65100; }
.warn-abs  { background:#fff8e6; color:#b7860b; }
.warning-info { flex: 1; }
.warning-info h4 { font-size: 13.5px; font-weight: 700; margin: 0; }
.warning-info p  { font-size: 12px; color: var(--text-muted); margin: 2px 0 0; }
.warning-status {
  font-size: 11.5px; font-weight: 600;
  padding: 3px 10px; border-radius: 12px;
}
.ws-open   { background:#fdf0ef; color:#c0392b; }
.ws-closed { background:#eafaf1; color:#1e7e4a; }

/* أزرار */
.btn-primary-custom {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff; border: none; border-radius: 10px;
  padding: 11px 28px; font-family: 'Tajawal', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary-custom:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,60,94,.25); }

.btn-outline-custom {
  background: transparent; color: var(--primary);
  border: 1.5px solid var(--primary); border-radius: 10px;
  padding: 10px 20px; font-family: 'Tajawal', sans-serif;
  font-size: 13.5px; font-weight: 600; cursor: pointer;
  transition: all .15s; display: inline-flex; align-items: center; gap: 7px;
}
.btn-outline-custom:hover { background: var(--primary); color: #fff; }

/* Spinner */
.spinner-overlay {
  position: fixed; inset: 0;
  background: rgba(255,255,255,.8);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; backdrop-filter: blur(4px);
}
.spinner-ring {
  width: 56px; height: 56px;
  border: 4px solid #e0d8c8; border-top-color: var(--primary);
  border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-overlay p { color: var(--primary); font-size: 15px; font-weight: 600; }

/* حالة فارغة */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text-muted);
}
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: .35; color: var(--primary); }
.empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
.empty-state p  { font-size: 13.5px; line-height: 1.6; }

/* نتائج طلب التسجيل */
.request-result {
  border-radius: 12px; padding: 20px 24px; margin-top: 18px;
  animation: slideUp .3s ease;
}
.rr-pending  { background:#eef3ff; border:1.5px solid #b8cff5; }
.rr-waiting  { background:#fff8e6; border:1.5px solid #f5d78e; }
.rr-rejected { background:#fdf0ef; border:1.5px solid #f0b8b0; }
.rr-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.rr-pending .rr-title  { color:#1a4f9c; }
.rr-waiting .rr-title  { color:#7a5c00; }
.rr-rejected .rr-title { color:#922b21; }
.rr-body { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

@media(max-width:600px) {
  .search-input-wrap { flex-direction: column; }
  .btn-search { justify-content: center; padding: 13px; }
  .tabs-bar { padding: 0 12px; gap: 0; overflow-x: auto; }
  .tab-btn  { padding: 12px 14px; font-size: 12.5px; }
  .student-card-header { flex-wrap: wrap; }
  .student-status-chip { margin-right: 0; margin-top: 6px; }
}


/* ── أرشيف الفصول والبرامج ── */
.archive-wrap { display: grid; gap: 18px; }
.archive-note {
  display:flex; gap:10px; align-items:flex-start;
  background:#fff8e6; border:1px solid #f0d080; color:#6f520e;
  border-radius:12px; padding:12px 14px; font-size:13px; line-height:1.7;
}
.archive-term-card {
  border:1px solid var(--border); border-radius:16px; background:#fff;
  overflow:hidden; box-shadow:0 3px 18px rgba(26,60,94,.07);
}
.archive-term-head {
  display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
  padding:18px 20px; background:linear-gradient(135deg,#f9f7f0,#fff);
  border-bottom:1px solid var(--border);
}
.archive-term-head h3 { font-size:17px; font-weight:800; color:var(--primary); margin:0 0 5px; }
.archive-term-head p { margin:0; font-size:12.5px; color:var(--text-muted); }
.archive-badges { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-start; }
.archive-status { display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:5px 10px; font-size:11.5px; font-weight:700; }
.archive-status.active { background:#eafaf1; color:#1e7e4a; border:1px solid #a9dfbf; }
.archive-status.archived { background:#eef3ff; color:#2563a8; border:1px solid #b8cff5; }
.archive-status.live { background:#fff8e6; color:#b7860b; border:1px solid #f5d78e; }
.archive-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:10px; padding:16px 20px; }
.archive-kpi { border:1px solid #eee6d2; background:#fafaf8; border-radius:12px; padding:12px; display:grid; gap:5px; }
.archive-kpi i { color:var(--primary-light); }
.archive-kpi span { color:var(--text-muted); font-size:11.5px; font-weight:600; }
.archive-kpi strong { color:var(--primary); font-size:20px; font-weight:900; line-height:1; }
.archive-sections { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; padding:0 20px 18px; }
.archive-box { border:1px solid var(--border); border-radius:14px; padding:14px; background:#fff; }
.archive-box h4, .archive-week-wrap h4 { font-size:13.5px; font-weight:800; color:var(--primary); margin:0 0 12px; display:flex; align-items:center; gap:7px; }
.archive-line { display:flex; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px dashed #eee6d2; font-size:12.5px; }
.archive-line:last-child { border-bottom:none; }
.archive-line span { color:var(--text-muted); }
.archive-line strong { color:var(--text-main); text-align:left; }
.archive-week-wrap { padding:0 20px 20px; }
.archive-week-table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:12px; }
.archive-week-table { width:100%; border-collapse:collapse; min-width:820px; font-size:12.5px; direction:rtl; }
.archive-week-table th { background:#f4f2ec; color:var(--primary); padding:10px; text-align:right; white-space:nowrap; }
.archive-week-table td { border-top:1px solid #eee6d2; padding:10px; vertical-align:top; }
.archive-pass, .archive-fail, .arch-muted { display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding:3px 8px; font-size:11px; font-weight:700; margin-top:3px; }
.archive-pass { background:#eafaf1; color:#1e7e4a; }
.archive-fail { background:#fdf0ef; color:#c0392b; }
.arch-muted { background:#f4f2ec; color:#5a6a7a; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-logo"><i class="fas fa-book-open-reader"></i></div>
    <div class="header-title">
      <h1>مجمع حلق جامع النصار</h1>
      <p> تابع لجمعية تحفيظ بريدة</p>
    </div>
    <div class="header-badge"><i class="fas fa-user fa-sm me-1"></i> بوابة بيانات الطالب</div>
  </div>
</header>

<div class="spinner-overlay" id="spinnerOverlay" style="display:none;">
  <div class="spinner-ring"></div>
  <p id="spinnerText">جارٍ البحث…</p>
</div>

<div class="main-wrap">

  <!-- بطاقة البحث -->
  <div class="search-card">
    <div class="search-header">
      <i class="fas fa-magnifying-glass"></i>
      <div class="search-header-text">
        <h2>البحث عن بيانات الطالب</h2>
        <p>أدخل رقم هوية الطالب أو رقم جوال ولي الأمر</p>
      </div>
    </div>
    <div class="search-body">
      <div class="search-input-wrap">
        <input type="text" id="searchInput"
          placeholder="رقم هوية الطالب أو جوال ولي الأمر"
          maxlength="12" inputmode="numeric"
          onkeydown="if(event.key==='Enter') doSearch()">
        <button class="btn-search" onclick="doSearch()">
          <i class="fas fa-search"></i> بحث
        </button>
      </div>
      <div class="search-hint">
        <i class="fas fa-circle-info fa-xs me-1"></i>
        يمكنك البحث برقم الهوية الوطنية للطالب أو برقم جوال ولي الأمر المسجل
      </div>
    </div>
  </div>

  <!-- حاوية النتائج -->
  <div id="resultsContainer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyfNLsP39SOzW1egWRWBG3OPEXUUJHxqZqa3yylzSY2hY_Dw_YOK9_W_-_iRFF-feUJFw/exec';

const GRADES = {
  'ابتدائي': ['الأول الابتدائي','الثاني الابتدائي','الثالث الابتدائي','الرابع الابتدائي','الخامس الابتدائي','السادس الابتدائي'],
  'متوسط':   ['الأول المتوسط','الثاني المتوسط','الثالث المتوسط'],
  'ثانوي':   ['الأول الثانوي','الثاني الثانوي','الثالث الثانوي'],
  'جامعي':   ['السنة الأولى','السنة الثانية','السنة الثالثة','السنة الرابعة','أكثر من أربع سنوات'],
};

let currentStudent = null;
let currentRequest = null;

// ── بحث ────────────────────────────────────────────
function normalizeSearchPhone(v) {
  let p = String(v || '').replace(/\D/g, '');

  if (p.startsWith('966') && p.length >= 12) p = p.substring(3);
  if (p.startsWith('0') && p.length === 10) p = p.substring(1);

  return p;
}

async function doSearch() {
  const raw = document.getElementById('searchInput').value.trim();
  const digits = raw.replace(/\D/g,'');
  const val = normalizeSearchPhone(digits);

  if (!val || val.length < 8) {
    Swal.fire({
      icon:'warning',
      title:'تنبيه',
      text:'يرجى إدخال رقم صحيح (8 أرقام على الأقل)',
      confirmButtonColor:'#1a3c5e',
      confirmButtonText:'حسناً'
    });
    return;
  }

  showSpinner(true, 'جارٍ البحث…');

  try {
    const res = await callAPI('بحث_عن_طالب', { بحث: val });

    if (res.طالب) {
      showSpinner(false);
      currentStudent = res.طالب;
      currentRequest = null;
      renderStudentCard(res.طالب);
      return;
    }

    const res2 = await callAPI('جلب_طلبات_التسجيل', {});
    showSpinner(false);

    const طلب = (res2.طلبات || []).find(ط => {
      const هوية = String(ط['رقم_هوية_الطالب'] || '').replace(/\D/g,'');
      const جوال = normalizeSearchPhone(ط['رقم_جوال_ولي_الامر'] || ط['رقم_جوال_الطالب'] || '');
      return هوية === val || جوال === val;
    });

    if (طلب) {
      currentStudent = null;
      currentRequest = طلب;
      renderRequestStatus(طلب);
    } else {
      document.getElementById('resultsContainer').innerHTML = `
        <div class="student-card mt-4">
          <div class="tab-content active">
            <div class="empty-state">
              <i class="fas fa-user-slash"></i>
              <h3>لا توجد نتائج</h3>
              <p>لم يُعثر على طالب أو طلب تسجيل مرتبط بهذا الرقم.<br>
              تحقق من الرقم وحاول مجدداً.</p>
            </div>
          </div>
        </div>`;
    }
  } catch(e) {
    showSpinner(false);
    Swal.fire({
      icon:'error',
      title:'خطأ في الاتصال',
      text:'تعذّر الاتصال بالخادم.',
      confirmButtonColor:'#1a3c5e',
      confirmButtonText:'حسناً'
    });
  }
}

function buildField(key, ط, label, icon, editable, type='text') {
  const val = ط[key];
  const isEmpty = isEmptyVal(val);
  const dispVal = isEmpty ? 'غير مُعبّأ' : val;
  const editAttr = editable ? `class="data-field editable" onclick="requestEdit('${key}','${label}','${type}',this)"` : `class="data-field"`;
  return `
    <div ${editAttr} data-key="${key}" data-val="${val || ''}">
      ${editable ? `<i class="edit-icon fas fa-pen"></i>` : ''}
      <div class="df-label"><i class="fas ${icon} fa-xs"></i> ${label}</div>
      <div class="df-value ${isEmpty?'empty':''}" id="dfv_${key}">${dispVal}</div>
    </div>`;
}

async function requestEdit(key, label, type, el) {
  if (!currentStudent) return;
  const القيمة_القديمة = currentStudent[key] || '';
  const isEmpty = isEmptyVal(القيمة_القديمة);

  // إذا كانت البيانات مُعبأة → إرسال طلب للمشرف
  // إذا كانت فارغة → تعديل مباشر بعد التأكيد

  let inputHtml = '';
  if (type === 'phone' || type === 'idnum') {
    inputHtml = `<input type="text" id="swal_input" class="swal2-input" inputmode="numeric"
      value="${القيمة_القديمة}" maxlength="${type==='phone'?10:12}"
      style="font-family:Tajawal;direction:ltr;text-align:center"
      oninput="this.value=this.value.replace(/\\D/g,'')">`;
  } else if (type === 'stage') {
    inputHtml = `<select id="swal_input" class="swal2-select" style="font-family:Tajawal" onchange="updateSwalGrades()">
      <option value="">-- اختر المرحلة --</option>
      ${['ابتدائي','متوسط','ثانوي','جامعي'].map(s=>`<option value="${s}" ${s===القيمة_القديمة?'selected':''}>${s}</option>`).join('')}
    </select>`;
  } else if (type === 'grade') {
    const stage = currentStudent['المرحلة_الدراسية'] || 'ابتدائي';
    const grades = GRADES[stage] || [];
    inputHtml = `<select id="swal_input" class="swal2-select" style="font-family:Tajawal">
      <option value="">-- اختر الصف --</option>
      ${grades.map(g=>`<option value="${g}" ${g===القيمة_القديمة?'selected':''}>${g}</option>`).join('')}
    </select>`;
  } else if (type === 'relation') {
    inputHtml = `<select id="swal_input" class="swal2-select" style="font-family:Tajawal">
      ${['أب','أخ','عم','خال','غير ذلك'].map(r=>`<option value="${r}" ${r===القيمة_القديمة?'selected':''}>${r}</option>`).join('')}
    </select>`;
  } else if (type === 'number') {
    inputHtml = `<input type="number" id="swal_input" class="swal2-input" value="${القيمة_القديمة}"
      min="0" max="30" style="font-family:Tajawal;text-align:center">`;
  } else {
    inputHtml = `<input type="text" id="swal_input" class="swal2-input"
      value="${القيمة_القديمة}" style="font-family:Tajawal;direction:rtl">`;
  }

  const actionTitle = isEmpty ? `تعبئة: ${label}` : `طلب تعديل: ${label}`;
  const actionNote  = isEmpty
    ? 'سيتم حفظ القيمة مباشرة.'
    : 'سيُرسل الطلب للمشرف الإداري للمراجعة والموافقة.';

  const { isConfirmed } = await Swal.fire({
    title: actionTitle,
    html: `
      <p style="font-size:13px;color:#5a6a7a;margin-bottom:12px">${actionNote}</p>
      ${!isEmpty ? `<p style="font-size:12px;background:#f0f0f0;padding:6px 12px;border-radius:8px;margin-bottom:10px">
        القيمة الحالية: <strong>${القيمة_القديمة}</strong></p>` : ''}
      ${inputHtml}`,
    confirmButtonText: isEmpty ? 'حفظ' : 'إرسال الطلب',
    cancelButtonText: 'إلغاء',
    showCancelButton: true,
    confirmButtonColor: '#1a3c5e',
    cancelButtonColor: '#aaa',
    customClass: { popup: 'swal-rtl' },
    didOpen: () => { document.getElementById('swal_input')?.focus(); },
    preConfirm: () => {
      const v = document.getElementById('swal_input')?.value?.trim();
      if (!v) { Swal.showValidationMessage('القيمة لا يمكن أن تكون فارغة'); return false; }
      if (type === 'phone' && v.length !== 10)   { Swal.showValidationMessage('يجب أن يكون 10 أرقام'); return false; }
      if (type === 'idnum' && (v.length < 8 || v.length > 12)) { Swal.showValidationMessage('يجب أن يكون 8-12 رقماً'); return false; }
      return v;
    }
  });

  if (!isConfirmed) return;
  const القيمة_الجديدة = await Swal.getConfirmResult?.() || document.getElementById('swal_input')?.value?.trim();

  // نعيد قراءة القيمة بعد إغلاق النافذة
  const newVal = Swal._result || '';

  // استخدم preConfirm result
  const finalVal = Swal._preConfirmValue || '';

  // الطريقة الصحيحة لجلب القيمة
  await sendEditRequest(key, label, القيمة_القديمة, _swalInputVal, isEmpty);
}

async function sendEditRequest(key, label, oldVal, newVal, isEmpty) {
  showSpinner(true, 'جارٍ إرسال الطلب…');
  try {
    let res;

    // حقول ولي الأمر
    const parentFields = [
      'اسم_ولي_الامر',
      'رقم_جوال_ولي_الامر',
      'رقم_هوية_ولي_الامر',
      'صلة_ولي_الامر'
    ];

    if (isEmpty) {
      // تعبئة مباشرة للحقول الفارغة فقط
      if (parentFields.includes(key)) {
        res = await callAPI('تعبئة_بيانات_طالب_ناقصة', {
          رقم_الطالب: currentStudent['رقم_الطالب'],
          تعديلات_ولي_الامر: { [key]: newVal }
        });
      } else {
        res = await callAPI('تعبئة_بيانات_طالب_ناقصة', {
          رقم_الطالب: currentStudent['رقم_الطالب'],
          تعديلات: { [key]: newVal }
        });
      }
    } else {
      // طلب تعديل يذهب للمشرف
      res = await callAPI('طلب_تعديل_بيانات', {
        رقم_الطالب: currentStudent['رقم_الطالب'],
        اسم_الطالب: currentStudent['اسم_الطالب'],
        الحقل: key,
        القيمة_القديمة: oldVal || '',
        القيمة_الجديدة: newVal
      });
    }

    showSpinner(false);

    if (res.نجاح) {
      if (isEmpty) {
        currentStudent[key] = newVal;
        const dfv = document.getElementById('dfv_' + key);
        if (dfv) {
          dfv.textContent = newVal;
          dfv.classList.remove('empty');
        }
      }

      Swal.fire({
        icon: 'success',
        title: isEmpty ? 'تم الحفظ!' : 'تم إرسال الطلب!',
        text: isEmpty
          ? 'تم تحديث البيانات مباشرة.'
          : 'سيتم مراجعة طلب التعديل من قِبل المشرف الإداري.',
        confirmButtonColor: '#1a3c5e',
        timer: 3000,
        timerProgressBar: true,
      });
    } else {
      throw new Error(res.خطأ || 'حدث خطأ');
    }
  } catch (e) {
    showSpinner(false);
    Swal.fire({
      icon: 'error',
      title: 'خطأ',
      text: e.message,
      confirmButtonColor: '#1a3c5e'
    });
  }
}


// ── أرشيف الفصول والبرامج ─────────────────────────────
function escHtml(v) {
  return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

function pctVal(v) {
  const n = Number(v || 0);
  if (!isFinite(n)) return '0%';
  return n.toFixed(n % 1 ? 1 : 0) + '%';
}

function badgeResult(isPassed) {
  if (isPassed === true) return '<span class="arch-pass"><i class="fas fa-check"></i> مجتاز</span>';
  if (isPassed === false) return '<span class="arch-fail"><i class="fas fa-xmark"></i> راسب</span>';
  return '<span class="arch-muted">—</span>';
}

async function loadStudentArchive(studentCode) {
  const el = document.getElementById('archiveContent');
  if (!el || !studentCode) return;

  try {
    const res = await callAPI('جلب_ارشيف_الطالب_للبوابة', { رقم_الطالب: studentCode });
    if (!res || !res.نجاح) throw new Error(res && res.خطأ ? res.خطأ : 'تعذر تحميل الأرشيف');
    renderStudentArchive(res.فترات || []);
  } catch (e) {
    el.innerHTML = `<div class="empty-state" style="padding:32px 20px">
      <i class="fas fa-circle-exclamation" style="font-size:36px;color:var(--danger);opacity:.65"></i>
      <h3 style="margin-top:12px;color:var(--danger)">تعذّر تحميل الأرشيف</h3>
      <p>${escHtml(e.message || 'حدث خطأ غير متوقع')}</p>
    </div>`;
  }
}

function renderStudentArchive(terms) {
  const el = document.getElementById('archiveContent');
  if (!el) return;

  if (!terms.length) {
    el.innerHTML = `<div class="empty-state" style="padding:36px 20px">
      <i class="fas fa-box-open" style="font-size:40px;opacity:.32"></i>
      <h3 style="margin-top:12px">لا يوجد أرشيف حتى الآن</h3>
      <p>سيظهر هنا ملخص الفصول والبرامج بعد تسجيل التحضير أو أرشفة الفترة.</p>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="archive-wrap">
    <div class="archive-note">
      <i class="fas fa-circle-info"></i>
      <div>يعرض هذا التبويب ملخص الفترة النشطة والفترات المؤرشفة للطالب، ويشمل الحضور والحفظ والربط والاختبارات وعرض الحزب.</div>
    </div>
    ${terms.map(renderArchiveTerm).join('')}
  </div>`;
}

function renderArchiveTerm(t) {
  const prep = t['التحضير'] || {};
  const mem  = t['الحفظ'] || {};
  const rabt = t['الربط'] || {};
  const tests = t['الاختبارات'] || {};
  const hizb = t['عرض_الحزب'] || {};
  const weeks = t['الأسابيع'] || [];
  const isActive = !!t['نشطة'];
  const isArchived = !!t['مؤرشفة'];

  return `<section class="archive-term-card">
    <div class="archive-term-head">
      <div>
        <h3>${escHtml(t['اسم_الفترة'] || 'فترة غير مسماة')}</h3>
        <p>${escHtml(t['نوع_الفترة'] || '—')} · من ${formatDate(t['تاريخ_البداية'])} إلى ${formatDate(t['تاريخ_النهاية'])}</p>
      </div>
      <div class="archive-badges">
        ${isActive ? '<span class="archive-status active"><i class="fas fa-bolt"></i> نشطة</span>' : ''}
        ${isArchived ? '<span class="archive-status archived"><i class="fas fa-lock"></i> مؤرشفة</span>' : '<span class="archive-status live"><i class="fas fa-clock"></i> مباشر</span>'}
      </div>
    </div>

    <div class="archive-kpis">
      ${archiveKpi('أيام التحضير', prep['إجمالي_الأيام'], 'fa-calendar-check')}
      ${archiveKpi('حضور', prep['حاضر'], 'fa-user-check')}
      ${archiveKpi('تأخر', prep['متأخر'], 'fa-user-clock')}
      ${archiveKpi('غياب', prep['غائب'], 'fa-calendar-xmark')}
      ${archiveKpi('إتمام الحفظ', pctVal(mem['نسبة_الإتمام']), 'fa-book-open')}
      ${archiveKpi('نسبة الحضور', pctVal(prep['نسبة_الحضور']), 'fa-chart-pie')}
    </div>

    <div class="archive-sections">
      <div class="archive-box">
        <h4><i class="fas fa-book-quran"></i> الحفظ والمسار</h4>
        <div class="archive-line"><span>المسار</span><strong>${escHtml(t['المسار'] || '—')}</strong></div>
        <div class="archive-line"><span>أتم</span><strong>${mem['أتم'] || 0}</strong></div>
        <div class="archive-line"><span>لم يتم</span><strong>${mem['لم_يتم'] || 0}</strong></div>
        <div class="archive-line"><span>آخر محفوظ</span><strong>${escHtml(mem['آخر_سورة'] || '—')}${mem['آخر_آية'] && mem['آخر_آية'] !== '—' ? ' - آية ' + escHtml(mem['آخر_آية']) : ''}</strong></div>
      </div>

      <div class="archive-box">
        <h4><i class="fas fa-link"></i> الربط</h4>
        <div class="archive-line"><span>إجمالي العروض</span><strong>${rabt['إجمالي'] || 0}</strong></div>
        <div class="archive-line"><span>مجتاز</span><strong>${rabt['مجتاز'] || 0}</strong></div>
        <div class="archive-line"><span>راسب</span><strong>${rabt['راسب'] || 0}</strong></div>
        <div class="archive-line"><span>نسبة الاجتياز</span><strong>${pctVal(rabt['نسبة_الاجتياز'])}</strong></div>
      </div>

      <div class="archive-box">
        <h4><i class="fas fa-clipboard-list"></i> الاختبارات</h4>
        <div class="archive-line"><span>إجمالي</span><strong>${tests['إجمالي'] || 0}</strong></div>
        <div class="archive-line"><span>مجتاز</span><strong>${tests['مجتاز'] || 0}</strong></div>
        <div class="archive-line"><span>راسب</span><strong>${tests['راسب'] || 0}</strong></div>
        <div class="archive-line"><span>متوسط الدرجة</span><strong>${tests['متوسط_الدرجة'] || 0}</strong></div>
      </div>

      <div class="archive-box">
        <h4><i class="fas fa-layer-group"></i> عرض الحزب</h4>
        <div class="archive-line"><span>عدد العروض</span><strong>${hizb['إجمالي'] || 0}</strong></div>
        <div class="archive-line"><span>آخر حزب</span><strong>${hizb['آخر_حزب'] || 0}</strong></div>
        <div class="archive-line"><span>متوسط الدرجة</span><strong>${hizb['متوسط_الدرجة'] || 0}</strong></div>
      </div>
    </div>

    ${renderArchiveWeeks(weeks)}
  </section>`;
}

function archiveKpi(label, value, icon) {
  return `<div class="archive-kpi">
    <i class="fas ${icon}"></i>
    <span>${label}</span>
    <strong>${value ?? 0}</strong>
  </div>`;
}

function renderArchiveWeeks(weeks) {
  if (!weeks || !weeks.length) return '';
  return `<div class="archive-week-wrap">
    <h4><i class="fas fa-calendar-week"></i> تفاصيل الأسابيع</h4>
    <div class="archive-week-table-wrap">
      <table class="archive-week-table">
        <thead><tr>
          <th>الأسبوع</th><th>الفترة</th><th>الحضور</th><th>الحفظ</th><th>الربط</th><th>الاختبارات</th><th>عرض الحزب</th>
        </tr></thead>
        <tbody>
          ${weeks.map(w => {
            const prep = w['تحضير'] || {}, mem = w['الحفظ'] || {}, rabt = w['الربط'] || {}, tests = w['الاختبارات'] || {}, hizb = w['عرض_الحزب'] || {};
            return `<tr>
              <td><strong>الأسبوع ${w['رقم_الأسبوع']}</strong></td>
              <td>${formatDate(w['من'])} - ${formatDate(w['إلى'])}</td>
              <td>حضور ${prep['حاضر'] || 0} · تأخر ${prep['متأخر'] || 0} · غياب ${prep['غائب'] || 0}</td>
              <td>${pctVal(mem['نسبة_الإتمام'])}<br><small>${escHtml(mem['آخر_محفوظ'] || '—')}</small></td>
              <td>${rabt['الدرجة'] ?? '—'} / 10<br>${badgeResult(rabt['مجتاز'])}</td>
              <td>${tests['العدد'] || 0} اختبار · متوسط ${tests['متوسط'] || 0}</td>
              <td>${hizb['العدد'] || 0} عرض · آخر حزب ${hizb['آخر_حزب'] || 0}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}


// ── تحميل الإنذارات ──────────────────────────────────
async function loadWarnings(studentCode, studentName) {
  const el = document.getElementById('warningsContent');
  if (!el || !studentCode) return;

  el.innerHTML = `<div class="empty-state" style="padding:32px 20px">
    <i class="fas fa-shield-halved" style="font-size:36px;opacity:.3"></i>
    <p style="margin-top:12px">جارٍ تحميل الإنذارات…</p>
  </div>`;

  try {
    const res = await callAPI('جلب_انذارات_الطالب_للبوابة', {
      رقم_الطالب: studentCode,
      اسم_الطالب: studentName || ''
    });

    if (!res || !res.نجاح) {
      throw new Error(res && res.خطأ ? res.خطأ : 'تعذر تحميل الإنذارات');
    }

    renderWarningsPortal(res);
  } catch (e) {
    console.error('Student warnings load error:', e);
    el.innerHTML = `<div class="empty-state" style="padding:32px 20px">
      <i class="fas fa-circle-exclamation" style="font-size:36px;color:var(--danger);opacity:.65"></i>
      <h3 style="margin-top:12px;color:var(--danger)">تعذّر تحميل الإنذارات</h3>
      <p>${escHtml(e.message || 'حدث خطأ غير متوقع')}</p>
    </div>`;
  }
}

function renderWarningsPortal(res) {
  const el = document.getElementById('warningsContent');
  if (!el) return;

  const edu = Array.isArray(res['تعليمية']) ? res['تعليمية'] : [];
  const admin = Array.isArray(res['إدارية']) ? res['إدارية'] : [];
  const summary = res['ملخص'] || {};
  const total = Number(summary['الإجمالي'] ?? (edu.length + admin.length));

  if (!total) {
    el.innerHTML = `<div class="empty-state" style="padding:36px 20px">
      <i class="fas fa-shield-halved" style="font-size:40px;color:var(--success);opacity:.6"></i>
      <h3 style="color:var(--success);margin-top:12px">لا توجد إنذارات</h3>
      <p>سجل الطالب خالٍ من أي إنذارات تعليمية أو إدارية.</p>
    </div>`;
    return;
  }

  el.innerHTML = `<div style="display:grid;gap:16px">
    <div class="archive-note">
      <i class="fas fa-circle-info"></i>
      <div>
        يعرض هذا التبويب الإنذارات التعليمية والإدارية المسجلة على الطالب، مع حالة الإنذار وتواريخ الإصدار والإغلاق والإجراء والملاحظات.
      </div>
    </div>

    <div class="archive-kpis" style="padding:0">
      ${warningKpi('إجمالي الإنذارات', total, 'fa-triangle-exclamation')}
      ${warningKpi('تعليمية', summary['تعليمية'] ?? edu.length, 'fa-book-open')}
      ${warningKpi('إدارية', summary['إدارية'] ?? admin.length, 'fa-user-clock')}
      ${warningKpi('مفتوحة', summary['مفتوحة'] ?? countOpenWarnings(edu, admin), 'fa-lock-open')}
      ${warningKpi('مغلقة', summary['مغلقة'] ?? countClosedWarnings(edu, admin), 'fa-lock')}
    </div>

    ${edu.length ? renderWarningsSection('الإنذارات التعليمية', edu, 'edu') : ''}
    ${admin.length ? renderWarningsSection('الإنذارات الإدارية', admin, 'admin') : ''}
  </div>`;
}

function warningKpi(label, value, icon) {
  return `<div class="archive-kpi">
    <i class="fas ${icon}"></i>
    <span>${escHtml(label)}</span>
    <strong>${value ?? 0}</strong>
  </div>`;
}

function countOpenWarnings(edu, admin) {
  return [...edu, ...admin].filter(w => isWarningOpen(w)).length;
}

function countClosedWarnings(edu, admin) {
  return [...edu, ...admin].filter(w => !isWarningOpen(w)).length;
}

function isWarningOpen(w) {
  if (typeof w['مفتوح'] === 'boolean') return w['مفتوح'];
  if (w['تاريخ_الإغلاق']) return false;
  const st = String(w['حالة_الإجراء'] || '').trim();
  return !['مغلق','مغلقة','مكتمل','مكتملة','منتهي','منتهية'].includes(st);
}

function renderWarningsSection(title, list, type) {
  const icon = type === 'edu' ? 'fa-book-open' : 'fa-user-clock';
  return `<section>
    <h3 style="font-size:14px;font-weight:800;color:var(--primary);margin:4px 0 12px;display:flex;align-items:center;gap:7px">
      <i class="fas ${icon}"></i>${title} (${list.length})
    </h3>
    <div style="display:grid;gap:10px">
      ${list.map(w => renderWarningRow(w, type)).join('')}
    </div>
  </section>`;
}

function renderWarningRow(w, type) {
  const open = isWarningOpen(w);
  const statusText = w['حالة_الإجراء'] || (open ? 'مفتوح' : 'مغلق');
  const iconClass = type === 'edu'
    ? 'warn-edu fa-triangle-exclamation'
    : adminWarningIcon(w['نوع_الانذار']);
  const cls = iconClass.split(' ');
  const mainTitle = type === 'edu'
    ? (w['سبب_الانذار'] || 'إنذار تعليمي')
    : `${displayAdminWarningType(w['نوع_الانذار'])}${w['رقم_العتبة'] ? ' — العتبة ' + escHtml(w['رقم_العتبة']) : ''}`;
  const issueDate = type === 'edu'
    ? (w['تاريخ_الإصدار'] || w['تاريخ_الاستحقاق'])
    : (w['تاريخ_الاستحقاق'] || w['تاريخ_الإصدار']);
  const closeDate = w['تاريخ_الإغلاق'];
  const actionText = w['الإجراء'] || w['الإجراء_المقترح'] || w['حالة_الإجراء'] || '—';
  const notes = w['ملاحظات'] || '—';
  const reason = type === 'edu'
    ? (w['سبب_الانذار'] || '—')
    : displayAdminWarningType(w['نوع_الانذار']);

  return `<div class="warning-row" style="align-items:flex-start">
    <div class="warning-icon-wrap ${cls[0]}"><i class="fas ${cls[1]}"></i></div>
    <div class="warning-info">
      <h4>${escHtml(mainTitle)}</h4>
      <p>
        <strong>تاريخ الإصدار:</strong> ${formatDate(issueDate)}
        <span style="color:#d8cbb5;margin:0 6px">|</span>
        <strong>تاريخ الإغلاق:</strong> ${formatDate(closeDate)}
      </p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:9px;font-size:12px;color:var(--text-muted)">
        <div><strong style="color:var(--text-main)">السبب/النوع:</strong> ${escHtml(reason)}</div>
        <div><strong style="color:var(--text-main)">الإجراء:</strong> ${escHtml(actionText)}</div>
        <div><strong style="color:var(--text-main)">الملاحظات:</strong> ${escHtml(notes)}</div>
        ${w['اسم_الفترة'] ? `<div><strong style="color:var(--text-main)">الفترة:</strong> ${escHtml(w['اسم_الفترة'])}</div>` : ''}
        ${w['عدد_المخالفات'] ? `<div><strong style="color:var(--text-main)">عدد المخالفات:</strong> ${escHtml(w['عدد_المخالفات'])}</div>` : ''}
      </div>
    </div>
    <span class="warning-status ${open ? 'ws-open' : 'ws-closed'}">${escHtml(statusText)}</span>
  </div>`;
}

function adminWarningIcon(type) {
  const t = String(type || '').trim();
  if (t === 'تأخر') return 'warn-late fa-user-clock';
  if (t === 'غياب') return 'warn-abs fa-calendar-xmark';
  if (t === 'غياب_بعذر' || t === 'غياب بعذر') return 'warn-abs fa-calendar-minus';
  return 'warn-abs fa-bell';
}

function displayAdminWarningType(type) {
  const t = String(type || '').trim();
  if (t === 'غياب_بعذر') return 'غياب بعذر';
  return t || 'إنذار إداري';
}

// ── تبديل التبويبات ──────────────────────────────────
function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId)?.classList.add('active');
}

// ── مساعدات ──────────────────────────────────────────
function df(label, val, icon) {
  return `<div class="data-field">
    <div class="df-label"><i class="fas ${icon} fa-xs"></i> ${label}</div>
    <div class="df-value">${val || '—'}</div>
  </div>`;
}

function isEmptyVal(v) {
  return !v || String(v).trim() === '' || String(v).trim() === '0';
}

function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('ar-SA-u-ca-islamic', { year:'numeric', month:'short', day:'numeric' }); }
  catch { return String(d).split('T')[0]; }
}

async function callAPI(action, data) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, data }),
  });
  return res.json();
}

function showSpinner(show, text='جارٍ التحميل…') {
  document.getElementById('spinnerOverlay').style.display = show ? 'flex' : 'none';
  document.getElementById('spinnerText').textContent = text;
}
